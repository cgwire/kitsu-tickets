name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release zip
        run: |
          zip -r kitsu-tickets-plugin.zip \
            manifest.toml \
            *.py \
            migrations/ \
            frontend/dist/ \
            logo.png \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kitsu-tickets-plugin.zip
          generate_release_notes: true
